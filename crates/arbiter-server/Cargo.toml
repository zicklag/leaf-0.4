[package]
name = "arbiter-server"
version = "0.1.0"
edition = "2024"

[[bin]]
name = "arbiter-server"
path = "src/main.rs"

[dependencies]
policy-core = { path = "../policy-core" }
anyhow = "1"
async-trait = "0.1"
atproto-identity = "0.14"
atproto-oauth = { version = "0.14", default-features = false }
atproto-plc = "0.2"
base64 = "0.22"
clap = { version = "4", features = ["derive", "env"] }
salvo = { version = "0.76", features = ["server"] }
serde = { version = "1", features = ["derive"] }
serde_json = "1"
regorus = "0.10"
tokio = { version = "1", features = ["full"] }
tracing = "0.1"
tracing-subscriber = { version = "0.3", features = ["env-filter"] }
reqwest = { version = "0.12", default-features = false, features = ["json", "rustls-tls"] }
bs58 = "0.5"
hex = "0.4"
ulid = "1"
