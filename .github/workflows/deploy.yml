name: Deploy Arbiter Simulator

on:
  push:
    branches: [main]
    paths:
      - "arbiter-simulator/**"
      - "crates/arbiter-core/**"
      - "crates/arbiter-server/**"
      - "crates/arbiter-wasm/**"
      - "lexicons/**"
      - ".github/workflows/deploy.yml"
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: false

env:
  BASE_PATH: /${{ github.event.repository.name }}/arbiter-simulator

jobs:
  build:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: arbiter-simulator

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 22

      - uses: pnpm/action-setup@v4

      - name: Install wasm-pack
        run: |
          curl https://rustwasm.github.io/wasm-pack/installer/init.sh -sSf | sh

      - name: Build WASM crate
        working-directory: crates/arbiter-wasm
        run: wasm-pack build --target web

      - name: Install dependencies
        run: pnpm install

      - name: Build
        run: pnpm build

      - name: Stage for Pages
        run: |
          mkdir -p _site
          mv dist _site/arbiter-simulator

      - name: Copy lexicon visualizer
        working-directory: .
        run: |
          mkdir -p arbiter-simulator/_site/arbiter-lexicons
          cp -r lexicons/town arbiter-simulator/_site/arbiter-lexicons/
          cp lexicons/index.html arbiter-simulator/_site/arbiter-lexicons/

      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: arbiter-simulator/_site

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
